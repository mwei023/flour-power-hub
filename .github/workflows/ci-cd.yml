name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Backend tests and build
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poshomill_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run linting
      working-directory: ./backend
      run: npm run lint || echo "No backend lint configured"

    - name: Run tests
      working-directory: ./backend
      run: npm test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: poshomill_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        JWT_SECRET: test-jwt-secret-for-testing-only
        NODE_ENV: test

    - name: Build application
      working-directory: ./backend
      run: npm run build

  # Frontend tests and build
  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npm run type-check

    # Frontend tests not configured - skipping
    # - name: Run tests
    #   run: npm test

    - name: Build application
      run: npm run build

  # Security scan
  security-scan:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
    - uses: actions/checkout@v4

    - name: Run security audit
      run: |
        cd backend && npm audit --audit-level=high || true
        cd .. && npm audit --audit-level=high || true

  # Build and push Docker images
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, security-scan]
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.production
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.production
        push: true
        tags: ${{ steps.meta.outputs.tags }}-frontend
        labels: ${{ steps.meta.outputs.labels }}

  # Database migrations
  database-migrate:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    
    environment: production
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: ./backend
      run: npm ci

    - name: Verify database secrets
      id: verify-secrets
      run: |
        echo "🔍 Checking required database secrets..."
        
        # Check if all required secrets are set
        MISSING_SECRETS=""
        
        if [ -z "${{ secrets.DB_HOST }}" ]; then
          MISSING_SECRETS="${MISSING_SECRETS} DB_HOST"
        fi
        if [ -z "${{ secrets.DB_PORT }}" ]; then
          MISSING_SECRETS="${MISSING_SECRETS} DB_PORT"
        fi
        if [ -z "${{ secrets.DB_NAME }}" ]; then
          MISSING_SECRETS="${MISSING_SECRETS} DB_NAME"
        fi
        if [ -z "${{ secrets.DB_USER }}" ]; then
          MISSING_SECRETS="${MISSING_SECRETS} DB_USER"
        fi
        if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
          MISSING_SECRETS="${MISSING_SECRETS} DB_PASSWORD"
        fi
        
        if [ -n "${MISSING_SECRETS}" ]; then
          echo "❌ Missing required secrets: ${MISSING_SECRETS}"
          echo "Please set these secrets in GitHub repository settings:"
          echo "  Repository Settings > Secrets and variables > Actions"
          echo ""
          echo "Required secrets:"
          echo "  - DB_HOST: Database server hostname or IP"
          echo "  - DB_PORT: Database port (default: 5432 for PostgreSQL)"
          echo "  - DB_NAME: Database name"
          echo "  - DB_USER: Database username"
          echo "  - DB_PASSWORD: Database password"
          echo "  - DB_SSL: Use SSL connection (true/false, optional)"
          exit 1
        fi
        
        echo "✅ All required database secrets are configured"

    - name: Run database migrations
      working-directory: ./backend
      run: npm run db:migrate
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_SSL: ${{ secrets.DB_SSL }}

  # Deploy to production via SSH
  deploy:
    runs-on: ubuntu-latest
    needs: [database-migrate]
    if: github.ref == 'refs/heads/main'
    
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          echo "🚀 Starting deployment..."
          
          # Navigate to project directory
          cd ${{ secrets.DEPLOY_PATH || '/home/mwei/flour-power-hub' }}
          
          # Pull latest changes
          git pull origin main
          
          # Rebuild backend
          cd backend
          npm ci
          npm run build
          cd ..
          
          # Rebuild frontend
          npm ci
          npm run build
          
          # Restart backend service
          sudo systemctl restart backend || pm2 restart backend || echo "No service manager configured"
          
          # Restart frontend (if using PM2 or similar)
          sudo systemctl restart nginx || pm2 restart frontend || echo "No frontend service"
          
          echo "✅ Deployment completed!"

    - name: Health check
      run: |
        echo "🏥 Performing health check..."
        
        # Wait for services to start
        sleep 10
        
        # Check backend health
        BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.HEALTH_CHECK_URL || 'https://amani.mwei.co.ke/api/v1/health' }})
        
        if [ "$BACKEND_HEALTH" = "200" ]; then
          echo "✅ Backend health check passed!"
        else
          echo "❌ Backend health check failed! Status: $BACKEND_HEALTH"
          exit 1
        fi
        
    - name: Notify deployment
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ Deployment completed successfully!"
        else
          echo "❌ Deployment failed! Check logs for details."
        fi

